<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawnTheory - Learn App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1><a href="index.html">PawnTheory<span>.</span></a></h1>
        <button class="back-action-btn" id="navHomeBtn">← Back</button>
    </header>

    <main class="app-container">
        <section class="board-column">
            <div class="board-container-box">
                <div id="interactiveChessboard" style="width: 100%;"></div>
            </div>
        </section>

        <section class="sidebar-column">
            <div class="coach-card" id="coachDisplayCard">
                <div class="coach-face" id="coachFaceGraphic">👨‍🏫</div>
                <div class="coach-bubble-content">
                    <div class="status-text" id="coachStatusField" style="color: var(--accent-primary);">GUIDE</div>
                    <h2 id="lessonViewTitle">Loading Opening...</h2>
                    <p id="coachBubbleSpeech">Drag and drop your pieces on the board to follow the tutorial goals.</p>
                </div>
            </div>

            <div class="panel-box">
                <div class="panel-title">Sequence Progression</div>
                <div class="moves-flow" id="movesPillFlow">
                    </div>

                <div class="panel-title" id="actionGridHeader" style="margin-top: 0.5rem;">Select Your Training Line</div>
                <div class="branch-list-group" id="variationsMenuBox">
                    </div>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js" crossorigin="anonymous"></script>
    
    <script src="js/openingsData.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
