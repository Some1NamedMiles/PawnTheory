<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawnTheory - Interactive Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1><a href="index.html">PawnTheory</a></h1>
        <div class="nav-right-actions">
            <div class="nav-item-icon">🏆</div>
            <div class="nav-item-icon">🔥 <span style="font-size:0.9rem; font-weight:bold;">1</span></div>
            <button class="footer-btn-outline" id="navQuitBtn">✕ Close</button>
        </div>
    </header>

    <div class="progress-bar-wrapper">
        <div class="progress-track">
            <div class="progress-fill" id="learningProgressBarFill"></div>
        </div>
    </div>

    <main class="lesson-workspace-wrapper">
        <section class="board-pane-left">
            <div class="board-box-wrapper">
                <div id="chessrepsBoard" style="width: 100%;"></div>
            </div>
        </section>

        <section class="interactive-panel-right">
            <div class="interactive-panel-header">
                <div>📖 <strong>Learn</strong> • <span id="courseSubTitleHeader">Sicilian Defense</span></div>
                <span style="font-weight:bold;" id="chapterIndexBadge">#1</span>
            </div>

            <div class="coach-speech-row">
                <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wP.png" class="pawn-avatar-icon" alt="Coach Icon">
                <div class="speech-bubble-white" id="coachSpeechBubbleBubble">
                    Loading training sequence...
                </div>
            </div>

            <div class="modes-vertical-stack">
                <div class="mode-block-row active-mode">
                    <div class="mode-left-info">
                        <span class="mode-title-text">📖 Learn</span>
                        <span class="mode-sub-text">0/38 lines discovered</span>
                    </div>
                </div>
                <div class="mode-block-row">
                    <div class="mode-left-info">
                        <span class="mode-title-text">🎯 Practice</span>
                        <span class="mode-sub-text">Learn 1 line to unlock</span>
                    </div>
                </div>
                <div class="mode-block-row">
                    <div class="mode-left-info">
                        <span class="mode-title-text">🔥 Drill</span>
                        <span class="mode-sub-text">Learn 3 lines to unlock</span>
                    </div>
                </div>
            </div>

            <div class="action-footer-row">
                <button class="footer-btn-outline" id="hintActionBtn">💡 Hint</button>
                
                <div class="arrow-controls-box">
                    <button class="arrow-btn" id="prevLineStepBtn">〈</button>
                    <button class="arrow-btn" id="nextLineStepBtn">〉</button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js" crossorigin="anonymous"></script>
    
    <script src="js/openingsData.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
