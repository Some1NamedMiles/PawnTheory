<!DOCTYPE html>
<html>
<head>
  <title>Italian Game - PawnTheory</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav>
  <h1>PawnTheory</h1>
</nav>

<div class="lesson">

  <h2>Italian Game</h2>
  <p>Learn the main ideas, not just memorization.</p>

  <h3>Move Sequence</h3>
  <div id="moves"></div>

  <h3>Black’s Choices</h3>

  <button onclick="choose('A')">A) Two Knights Defense (Nc6)</button>
  <button onclick="choose('B')">B) Giuoco Piano (Bc5)</button>
  <button onclick="choose('C')">C) Early counterattack (d5)</button>

  <p id="explanation"></p>

</div>

<script>
const moves = ["e4", "e5", "Nf3", "Nc6", "Bc4"];

document.getElementById("moves").innerText =
  moves.join(" → ");

function choose(line) {
  const text = document.getElementById("explanation");

  if (line === "A") {
    text.innerText =
      "Two Knights Defense: tactical. Watch for Ng5 ideas targeting f7.";
  }

  if (line === "B") {
    text.innerText =
      "Giuoco Piano: slow and positional. Focus on center control and development.";
  }

  if (line === "C") {
    text.innerText =
      "Early d5 is risky. If mistimed, Black loses central control quickly.";
  }
}
</script>

</body>
</html>
